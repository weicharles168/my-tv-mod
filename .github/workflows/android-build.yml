name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Unzip full source
        run: |
          rm -rf source
          mkdir source
          unzip -q my-tv-0-1.3.9.7-kitkat-single-source-modified-source.zip -d source
          echo "查看解压后的目录："
          find source -maxdepth 3 -type f | head -80
          echo "查找 gradlew："
          find source -name gradlew
          echo "查找 app 模块："
          find source -maxdepth 3 -type d -name app

      - name: Build Release APK
        run: |
          PROJECT_DIR=$(dirname $(find source -name gradlew | head -n 1))
          echo "项目目录：$PROJECT_DIR"
          cd "$PROJECT_DIR"
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --stacktrace

      - name: Create keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: |
          APK=$(find source -path "*/app/build/outputs/apk/release/*unsigned*.apk" | head -n 1)
          echo "Unsigned APK: $APK"
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app-release-signed.apk \
            "$APK"

      - name: Verify APK
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify app-release-signed.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: my-tv-0-signed-apk
          path: app-release-signed.apk
